hero:
  title: C1 License Training
  description: Specialist training for medium sized trucks (3.5-7.5 tonnes)
what_is_c1:
  heading: What is a C1 License?
  text: A C1 driving license allows you to drive vehicles between 3.5 and 7.5
    tonnes, including ambulances and other emergency vehicles. For paramedics
    and emergency medical technicians, obtaining a C1 license is essential for
    operating ambulances, horse boxes, delivery vehicles and larger motorhomes.
  who_needs_title: Who Needs C1 Training?
  who_needs:
    - Paramedics and emergency medical technicians
    - Ambulance service personnel
    - Horse boxes
    - larger delivery vehicle drivers
advantages:
  title: The Paramedic Advantage
  items:
    - title: Real-World Experience
      description: Your instructors have 50+ years combined experience as paramedics.
        We understand the specific challenges of emergency vehicle driving
        because we've lived it.
    - title: Professional Training
      description: We speak your language and understand the pressures you'll face.
        Our training is tailored to suit each individual.
    - title: 90% First-Time Pass Rate
      description: Our proven teaching methods and comprehensive preparation help the
        vast majority of our students pass their C1 test first time.
course:
  steps:
    - heading: Initial Assessment
      description: We assess your current driving skills and create a personalised
        training plan tailored to your needs and experience level.
    - heading: Vehicle Familiarisation
      description: Learn the specifics of handling larger vehicles, including weight
        distribution, turning circles, and braking distances.
    - heading: Maneouvers & Reversing
      description: Master the challenging reversing exercises and maneuvers required
        for the C1 test.
    - heading: Road Driving & Hazard Awareness
      description: Develop advanced hazard perception skills and safe driving
        techniques for all weather conditions and traffic situations.
    - heading: Test Preparation
      description: Comprehensive mock tests and final preparation to ensure you're
        fully confident and ready for your practical test.
pricing:
