hero:
  title: About Us
  description: Two ex-paramedic driving instructors with a combined 50+ years of
    emergency services experience, dedicated to providing the highest quality
    driver training in Warrington and surrounding areas.
story:
  - Having both served as paramedics for many years, we understand the unique
    challenges and requirements of emergency vehicle driving. Our transition
    from paramedic work to driver training was driven by a passion to share the
    critical skills we developed in emergency services with the next generation
    of ambulance drivers and everyday motorists.
  - Our emergency services background gives us a unique perspective that sets us
    apart from traditional driving instructors. We don't just teach the
    mechanics of driving—we instill defensive driving techniques, hazard
    awareness, and the calm, methodical approach that comes from years of
    high-pressure emergency response driving.
instructors:
  - name: Jayne Cumisky
    image: /jayne.jpg
    experience: 23
    bio: >
      Jayne brings her extensive 23 years of experience from the ambulance
      service to help paramedic trainees master the specific skills needed for
      emergency medical transport. Her calm, methodical approach helps even
      nervous students gain confidence with larger C1 vehicles. Jayne ensures
      all students meet the highest safety standards.


      With a foundation in the Goals for Driver Education (GDE) framework, I aim to educate younger generations on road safety, emphasising how attitudes, behaviours, and decision-making directly influence risk and driving outcomes.
    qualifications:
      - ADI (Approved Driving Instructor) - DVSA Certified
      - Defensive driving coach with 23+ years of Emergency Response Driving
        experience
      - CET
      - CAVA
    job_title: ADI & C1 Driving Instructor
  - name: Neil Harrison
    image: /neil.png
    experience: 35
    bio: Neil's technical expertise and patient teaching style have helped hundreds
      of paramedic trainees successfully obtain their C1 license with a
      first-time pass rate of over 90%. With 35 years in emergency services, he
      specialises in helping students master the challenging technical aspects
      of handling larger emergency vehicles, including reversing manoeuvres,
      hazard perception, and safe driving in all weather conditions.
    qualifications:
      - ADI (Approved Driving Instructor) - DVSA Certified
      - Defensive Driving coach with 20+ years of Emergency Response Driving
        experience
      - Former Emergency Services Driver Trainer and Safety Consultant
      - CET
      - CAVA
    job_title: ADI & C1 Driving Instructor
