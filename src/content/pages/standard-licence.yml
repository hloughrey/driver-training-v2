hero:
  title: Standard Driving Lessons
  description: Learn to drive with confidence from ex-paramedic instructors
why_us:
  title: Why Learn With Us?
  items:
    - title: Defensive Driving Expertise
      description: Our emergency services background means we teach defensive driving
        techniques from day one, helping you become a safer, more aware driver.
    - title: 50+ Years Experience
      description: Combined emergency services and driving instruction experience
        means you're learning from true professionals.
    - title: Flexible Scheduling
      description: We offer flexible lesson times to fit around your work, studies, or
        other commitments. Evening and weekend slots available.
    - title: Patient, Calm Instruction
      description: Our paramedic background taught us to stay calm under pressure and
        communicate clearly—perfect skills for helping nervous learners.
what_you_learn:
  title: What You'll Learn
  items:
    - heading: Vehicle Controls & Road Safety
      description: Master the basics of vehicle control, including steering, gear
        changes, clutch control, and understanding road signs and markings.
    - heading: Hazard Awareness & Defensive Driving
      description: Learn to identify and respond to potential hazards early, using
        defensive driving techniques developed from emergency services
        experience.
    - heading: Maneuvers & Parking
      description: Perfect your parallel parking, bay parking, and all test maneuvers
        with patient, step-by-step instruction.
    - heading: All Weather & Driving Conditions
      description: Gain confidence driving in rain, at night, and in various traffic
        conditions across urban and rural areas.
    - heading: Test Preparation
      description: Comprehensive preparation for your practical driving test,
        including mock tests on actual test routes.
