<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

  <script>
    var h = React.createElement;
    var PRIMARY = '#1a56db';
    var MUTED = '#6b7280';

    // Shared styles
    var styles = {
      page: { fontFamily: 'system-ui, sans-serif', maxWidth: '900px', margin: '0 auto', color: '#111' },
      hero: {
        padding: '80px 24px',
        textAlign: 'center',
        background: 'linear-gradient(to bottom, rgba(26,86,219,0.25), rgba(26,86,219,0.05))',
        marginBottom: '0'
      },
      h1: { fontSize: '2.25rem', fontWeight: '700', marginBottom: '16px', lineHeight: '1.2' },
      h2: { fontSize: '1.75rem', fontWeight: '700', marginBottom: '24px' },
      p: { color: MUTED, marginBottom: '12px', lineHeight: '1.6' },
      btn: { display: 'inline-block', padding: '10px 24px', background: PRIMARY, color: '#fff', borderRadius: '6px', textDecoration: 'none', marginRight: '8px' },
      btnOutline: { display: 'inline-block', padding: '10px 24px', border: '1px solid ' + PRIMARY, color: PRIMARY, borderRadius: '6px', textDecoration: 'none' },
      section: { padding: '48px 24px' },
      sectionMuted: { padding: '48px 24px', background: '#f9fafb' },
      card: { border: '1px solid #e5e7eb', borderRadius: '8px', padding: '20px', marginBottom: '16px' },
      cardHighlight: { border: '2px solid ' + PRIMARY, borderRadius: '8px', padding: '20px', marginBottom: '16px' },
      grid2: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' },
      grid3: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px' },
      check: { color: PRIMARY, marginRight: '8px' }
    };

    // Homepage preview
    var HomepagePreview = function(props) {
      var entry = props.entry;
      var data = entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var services = data.services || {};
      var c1 = services.c1 || {};
      var standard = services.standard || {};
      var stats = data.stats || [];
      var instructors = data.instructors_section || {};

      return h('div', { style: styles.page },
        h('div', { style: styles.hero },
          h('h1', { style: styles.h1 }, hero.headline || 'Headline'),
          h('p', { style: { color: '#fff', marginBottom: '8px', fontWeight: '500' } }, hero.subheadline || ''),
          h('p', { style: { color: '#e5e7eb', marginBottom: '24px' } }, hero.description || ''),
          h('div', null,
            h('span', { style: styles.btn }, hero.primary_cta_text || 'Primary CTA'),
            h('span', { style: styles.btnOutline }, hero.secondary_cta_text || 'Secondary CTA')
          )
        ),
        h('div', { style: styles.section },
          h('h2', { style: { ...styles.h2, textAlign: 'center' } }, services.title || 'Our Services'),
          h('p', { style: { ...styles.p, textAlign: 'center', marginBottom: '32px' } }, services.subtitle || ''),
          h('div', { style: styles.grid2 },
            h('div', { style: styles.cardHighlight },
              h('h3', { style: { fontWeight: '600', marginBottom: '8px' } }, c1.title || 'C1 License Training'),
              h('p', { style: styles.p }, c1.description || ''),
              h('ul', { style: { listStyle: 'none', padding: 0 } },
                (c1.features || []).map(function(f, i) {
                  return h('li', { key: i, style: { marginBottom: '4px' } }, h('span', { style: styles.check }, '✓'), f);
                })
              )
            ),
            h('div', { style: styles.card },
              h('h3', { style: { fontWeight: '600', marginBottom: '8px' } }, standard.title || 'Standard License Training'),
              h('p', { style: styles.p }, standard.description || ''),
              h('ul', { style: { listStyle: 'none', padding: 0 } },
                (standard.features || []).map(function(f, i) {
                  return h('li', { key: i, style: { marginBottom: '4px' } }, h('span', { style: styles.check }, '✓'), f);
                })
              )
            )
          )
        ),
        h('div', { style: styles.sectionMuted },
          h('h2', { style: { ...styles.h2, textAlign: 'center' } }, instructors.title || 'Meet Your Instructors'),
          h('p', { style: { ...styles.p, textAlign: 'center' } }, instructors.subtitle || '')
        ),
        h('div', { style: { ...styles.section, background: '#fff' } },
          h('div', { style: { ...styles.grid3, maxWidth: '600px', margin: '0 auto', textAlign: 'center' } },
            stats.map(function(stat, i) {
              return h('div', { key: i },
                h('div', { style: { fontSize: '2rem', fontWeight: '700', color: PRIMARY } }, stat.value),
                h('div', { style: { color: MUTED, fontSize: '0.875rem' } }, stat.label)
              );
            })
          )
        )
      );
    };
    CMS.registerPreviewTemplate('homepage', HomepagePreview);

    // C1 Licence preview
    var C1Preview = function(props) {
      var entry = props.entry;
      var data = entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var advantages = data.advantages || {};
      var pricing = data.pricing || {};

      return h('div', { style: styles.page },
        h('div', { style: { ...styles.sectionMuted, textAlign: 'center' } },
          h('h1', { style: styles.h1 }, hero.title || 'C1 License Training'),
          h('p', { style: styles.p }, hero.description || '')
        ),
        h('div', { style: styles.section },
          h('h2', { style: { ...styles.h2, textAlign: 'center' } }, advantages.title || 'The Paramedic Advantage'),
          h('div', { style: styles.grid2 },
            (advantages.items || []).map(function(item, i) {
              return h('div', { key: i, style: styles.card },
                h('h3', { style: { fontWeight: '600', marginBottom: '8px' } }, item.title),
                h('p', { style: styles.p }, item.description)
              );
            })
          )
        ),
        h('div', { style: styles.sectionMuted },
          h('h2', { style: { ...styles.h2, textAlign: 'center' } }, 'Pricing'),
          h('div', { style: styles.cardHighlight },
            h('h3', { style: { fontWeight: '600', fontSize: '1.25rem', marginBottom: '12px' } }, pricing.title || 'C1 License Training'),
            h('p', { style: styles.p }, pricing.description || ''),
            h('p', { style: { fontWeight: '600', marginBottom: '8px' } }, pricing.cta_text || '')
          )
        )
      );
    };
    CMS.registerPreviewTemplate('c1-licence', C1Preview);

    // Standard Licence preview
    var StandardPreview = function(props) {
      var entry = props.entry;
      var data = entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var pricing = data.pricing || {};
      var packages = pricing.packages || [];

      return h('div', { style: styles.page },
        h('div', { style: { ...styles.sectionMuted, textAlign: 'center' } },
          h('h1', { style: styles.h1 }, hero.title || 'Standard Driving Lessons'),
          h('p', { style: styles.p }, hero.description || '')
        ),
        h('div', { style: styles.section },
          h('h2', { style: { ...styles.h2, textAlign: 'center' } }, pricing.title || 'Lesson Packages'),
          h('div', { style: styles.grid3 },
            packages.map(function(pkg, i) {
              return h('div', { key: i, style: pkg.featured ? styles.cardHighlight : styles.card },
                h('h3', { style: { fontWeight: '600', marginBottom: '4px' } }, pkg.name),
                h('p', { style: { color: pkg.featured ? PRIMARY : MUTED, fontSize: '0.875rem', marginBottom: '12px' } }, pkg.tagline),
                h('div', { style: { fontSize: '1.75rem', fontWeight: '700', marginBottom: '4px' } }, pkg.price),
                pkg.savings && h('div', { style: { color: MUTED, fontSize: '0.875rem', marginBottom: '12px' } }, pkg.savings),
                h('ul', { style: { listStyle: 'none', padding: 0 } },
                  (pkg.features || []).map(function(f, j) {
                    return h('li', { key: j, style: { marginBottom: '4px', fontSize: '0.875rem', color: MUTED } },
                      h('span', { style: styles.check }, '✓'), f
                    );
                  })
                )
              );
            })
          ),
          pricing.note && h('p', { style: { ...styles.p, textAlign: 'center', marginTop: '16px' } }, pricing.note)
        )
      );
    };
    CMS.registerPreviewTemplate('standard-licence', StandardPreview);

    // About page preview
    var AboutPreview = function(props) {
      var entry = props.entry;
      var data = entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var story = data.story || [];
      var instructors = data.instructors || [];

      return h('div', { style: styles.page },
        h('div', { style: { ...styles.sectionMuted, textAlign: 'center' } },
          h('h1', { style: styles.h1 }, hero.title || 'About Us'),
          h('p', { style: styles.p }, hero.description || '')
        ),
        h('div', { style: styles.section },
          h('h2', { style: styles.h2 }, 'Our Story'),
          story.map(function(para, i) {
            return h('p', { key: i, style: styles.p }, para);
          })
        ),
        h('div', { style: { ...styles.section, background: '#f9fafb' } },
          h('h2', { style: styles.h2 }, 'Instructors'),
          h('div', { style: styles.grid2 },
            instructors.map(function(inst, i) {
              return h('div', { key: i, style: styles.card },
                h('h3', { style: { fontWeight: '600', marginBottom: '4px' } }, inst.name),
                h('p', { style: { color: PRIMARY, fontSize: '0.875rem', marginBottom: '8px' } }, inst.job_title + ' · ' + inst.experience + ' years'),
                h('p', { style: { ...styles.p, fontSize: '0.875rem' } }, inst.bio)
              );
            })
          )
        )
      );
    };
    CMS.registerPreviewTemplate('about', AboutPreview);

    // Site settings preview
    var SiteSettingsPreview = function(props) {
      var entry = props.entry;
      var data = entry.getIn(['data']).toJS();

      return h('div', { style: styles.page },
        h('div', { style: styles.section },
          h('h2', { style: styles.h2 }, 'Global Site Settings'),
          h('div', { style: styles.card },
            h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
              h('tbody', null,
                [
                  ['Phone', data.phone],
                  ['Phone Link', data.phone_href],
                  ['Email', data.email],
                  ['Location', data.location]
                ].map(function(row, i) {
                  return h('tr', { key: i, style: { borderBottom: '1px solid #e5e7eb' } },
                    h('td', { style: { padding: '8px', fontWeight: '600', width: '40%' } }, row[0]),
                    h('td', { style: { padding: '8px', color: MUTED } }, row[1] || '—')
                  );
                })
              )
            )
          ),
          h('h3', { style: { fontWeight: '600', marginTop: '24px', marginBottom: '12px' } }, 'Standard Service Areas'),
          h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px' } },
            (data.service_areas_standard || []).map(function(area, i) {
              return h('span', { key: i, style: { padding: '4px 12px', background: '#e5e7eb', borderRadius: '99px', fontSize: '0.875rem' } }, area);
            })
          ),
          h('h3', { style: { fontWeight: '600', marginTop: '24px', marginBottom: '12px' } }, 'C1 Service Areas'),
          h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px' } },
            (data.service_areas_c1 || []).map(function(area, i) {
              return h('span', { key: i, style: { padding: '4px 12px', background: '#dbeafe', borderRadius: '99px', fontSize: '0.875rem', color: PRIMARY } }, area);
            })
          )
        )
      );
    };
    CMS.registerPreviewTemplate('site', SiteSettingsPreview);
  </script>
</body>
</html>
