<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

  <script>
    CMS.registerPreviewStyle('/admin/preview.css');

    function PageHeroPreview(title, description) {
      return h('section', { className: 'relative min-h-[400px] sm:min-h-[500px] overflow-hidden' },
        h('div', { className: 'absolute inset-0 -z-10' },
          h('img', {
            src: '/driver-training.jpg',
            alt: '',
            style: { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }
          }),
          h('div', { className: 'absolute inset-0 bg-gradient-to-b from-primary/30 via-primary/20 to-background/90' })
        ),
        h('div', { className: 'container px-4 py-20' },
          h('div', { className: 'mx-auto max-w-3xl text-center space-y-6' },
            h('h1', { className: 'text-4xl sm:text-5xl font-bold text-white' }, title || ''),
            description && h('p', { className: 'text-xl text-white/90' }, description)
          )
        )
      );
    }

    // Homepage preview
    var HomepagePreview = function(props) {
      var data = props.entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var services = data.services || {};
      var c1 = services.c1 || {};
      var standard = services.standard || {};
      var stats = data.stats || [];
      var instructors = data.instructors_section || {};

      return h('div', null,
        h('section', { className: 'relative min-h-[500px] sm:min-h-[600px] overflow-hidden' },
          h('div', { className: 'absolute inset-0 -z-10' },
            h('img', {
              src: '/driver-training.jpg',
              alt: '',
              style: { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }
            }),
            h('div', { className: 'absolute inset-0 bg-gradient-to-b from-primary/30 via-primary/20 to-background/90' })
          ),
          h('div', { className: 'container px-4 py-20 sm:py-32' },
            h('div', { className: 'mx-auto max-w-3xl text-center space-y-8' },
              h('h1', { className: 'text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight text-white' },
                hero.headline || 'Headline'),
              h('p', { className: 'text-lg sm:text-xl text-white/90 max-w-2xl mx-auto' },
                hero.subheadline || ''),
              h('p', { className: 'text-base sm:text-lg text-white/85' },
                hero.description || ''),
              h('div', { className: 'flex flex-col sm:flex-row gap-4 justify-center items-center' },
                h('span', { className: 'inline-flex items-center justify-center rounded-md bg-primary text-primary-foreground h-11 px-8 text-sm font-medium' },
                  hero.primary_cta_text || 'Primary CTA'),
                h('span', { className: 'inline-flex items-center justify-center rounded-md border border-input bg-background h-11 px-8 text-sm font-medium' },
                  hero.secondary_cta_text || 'Secondary CTA')
              )
            )
          )
        ),

        h('section', { className: 'py-16 sm:py-24 bg-background' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'text-center space-y-4 mb-12' },
              h('h2', { className: 'text-3xl sm:text-4xl font-bold' }, services.title || 'Our Services'),
              h('p', { className: 'text-muted-foreground max-w-2xl mx-auto' }, services.subtitle || '')
            ),
            h('div', { className: 'grid md:grid-cols-2 gap-8 max-w-5xl mx-auto' },
              h('div', { className: 'rounded-xl border-2 border-primary bg-card text-card-foreground shadow' },
                h('div', { className: 'p-6' },
                  h('h3', { className: 'text-2xl font-semibold leading-none tracking-tight' }, c1.title || 'C1 License Training'),
                  h('p', { className: 'text-sm text-muted-foreground mt-1.5' }, c1.description || '')
                ),
                h('div', { className: 'p-6 pt-0 space-y-4' },
                  h('ul', { className: 'space-y-2 text-base' },
                    (c1.features || []).map(function(f, i) {
                      return h('li', { key: i, className: 'flex items-start' },
                        h('span', { className: 'text-primary mr-2' }, '✓'),
                        h('span', null, f)
                      );
                    })
                  )
                )
              ),
              h('div', { className: 'rounded-xl border bg-card text-card-foreground shadow' },
                h('div', { className: 'p-6' },
                  h('h3', { className: 'text-2xl font-semibold leading-none tracking-tight' }, standard.title || 'Standard License Training'),
                  h('p', { className: 'text-sm text-muted-foreground mt-1.5' }, standard.description || '')
                ),
                h('div', { className: 'p-6 pt-0 space-y-4' },
                  h('ul', { className: 'space-y-2 text-base' },
                    (standard.features || []).map(function(f, i) {
                      return h('li', { key: i, className: 'flex items-start' },
                        h('span', { className: 'text-primary mr-2' }, '✓'),
                        h('span', null, f)
                      );
                    })
                  )
                )
              )
            )
          )
        ),

        h('section', { className: 'py-16 sm:py-24 bg-muted/50' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'text-center space-y-4 mb-12' },
              h('h2', { className: 'text-3xl sm:text-4xl font-bold' }, instructors.title || 'Meet Your Instructors'),
              h('p', { className: 'text-muted-foreground max-w-2xl mx-auto' }, instructors.subtitle || '')
            )
          )
        ),

        h('section', { className: 'py-16 bg-background' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'max-w-4xl mx-auto grid sm:grid-cols-3 gap-8 text-center' },
              stats.map(function(stat, i) {
                return h('div', { key: i, className: 'space-y-2' },
                  h('div', { className: 'text-4xl font-bold text-primary' }, stat.value),
                  h('div', { className: 'text-base text-muted-foreground' }, stat.label)
                );
              })
            )
          )
        )
      );
    };
    CMS.registerPreviewTemplate('homepage', HomepagePreview);

    // C1 Licence preview
    var C1Preview = function(props) {
      var data = props.entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var advantages = data.advantages || {};
      var course = data.course || {};
      var pricing = data.pricing || {};

      return h('div', null,
        PageHeroPreview(hero.title, hero.description),

        h('section', { className: 'py-16 bg-muted/50' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'max-w-4xl mx-auto' },
              h('h2', { className: 'text-3xl font-bold mb-8 text-center' }, advantages.title || 'The Paramedic Advantage'),
              h('div', { className: 'grid sm:grid-cols-2 gap-6' },
                (advantages.items || []).map(function(item, i) {
                  return h('div', { key: i, className: 'rounded-xl border bg-card text-card-foreground shadow' },
                    h('div', { className: 'p-6' },
                      h('h3', { className: 'text-lg font-semibold leading-none tracking-tight' }, item.title)
                    ),
                    h('div', { className: 'p-6 pt-0' },
                      h('p', { className: 'text-muted-foreground' }, item.description)
                    )
                  );
                })
              )
            )
          )
        ),

        h('section', { className: 'py-16 bg-background' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'max-w-4xl mx-auto' },
              h('h2', { className: 'text-3xl font-bold mb-8' }, 'Course Structure'),
              h('div', { className: 'rounded-xl border bg-card text-card-foreground shadow' },
                h('div', { className: 'p-6' },
                  h('h3', { className: 'text-lg font-semibold' }, 'Training Program')
                ),
                h('div', { className: 'p-6 pt-0 space-y-4' },
                  (course.steps || []).map(function(step, i) {
                    return h('div', { key: i },
                      h('h4', { className: 'font-semibold mb-2' }, step.heading),
                      h('p', { className: 'text-muted-foreground' }, step.description)
                    );
                  })
                )
              )
            )
          )
        ),

        h('section', { className: 'py-16 bg-muted/50' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'max-w-4xl mx-auto' },
              h('h2', { className: 'text-3xl font-bold mb-8 text-center' }, 'Pricing'),
              h('div', { className: 'rounded-xl border-2 border-primary bg-card text-card-foreground shadow' },
                h('div', { className: 'p-6' },
                  h('h3', { className: 'text-2xl font-semibold' }, pricing.title || 'C1 License Training')
                ),
                h('div', { className: 'p-6 pt-0 space-y-4' },
                  h('p', { className: 'text-muted-foreground' }, pricing.description || ''),
                  (pricing.includes || []).length > 0 && h('div', { className: 'space-y-2' },
                    h('p', { className: 'font-semibold' }, 'Typical course includes:'),
                    h('ul', { className: 'space-y-1 text-muted-foreground ml-4' },
                      (pricing.includes || []).map(function(item, i) {
                        return h('li', { key: i }, '• ' + item);
                      })
                    )
                  ),
                  h('div', { className: 'pt-4 border-t' },
                    h('p', { className: 'text-lg font-semibold mb-2' }, pricing.cta_text || '')
                  )
                )
              )
            )
          )
        )
      );
    };
    CMS.registerPreviewTemplate('c1-licence', C1Preview);

    // Standard Licence preview
    var StandardPreview = function(props) {
      var data = props.entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var why_us = data.why_us || {};
      var pricing = data.pricing || {};
      var packages = pricing.packages || [];

      return h('div', null,
        PageHeroPreview(hero.title, hero.description),

        h('section', { className: 'py-16 bg-background' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'max-w-4xl mx-auto' },
              h('h2', { className: 'text-3xl font-bold mb-8 text-center' }, why_us.title || 'Why Choose Us'),
              h('div', { className: 'grid sm:grid-cols-2 gap-6' },
                (why_us.items || []).map(function(item, i) {
                  return h('div', { key: i, className: 'rounded-xl border bg-card text-card-foreground shadow' },
                    h('div', { className: 'p-6' },
                      h('h3', { className: 'text-lg font-semibold leading-none tracking-tight' }, item.title)
                    ),
                    h('div', { className: 'p-6 pt-0' },
                      h('p', { className: 'text-muted-foreground' }, item.description)
                    )
                  );
                })
              )
            )
          )
        ),

        h('section', { className: 'py-16 bg-background' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'max-w-4xl mx-auto' },
              h('h2', { className: 'text-3xl font-bold mb-8 text-center' }, pricing.title || 'Lesson Packages'),
              h('div', { className: 'grid md:grid-cols-3 gap-6' },
                packages.map(function(pkg, i) {
                  return h('div', {
                    key: i,
                    className: pkg.featured
                      ? 'rounded-xl border-2 border-primary bg-card text-card-foreground shadow'
                      : 'rounded-xl border bg-card text-card-foreground shadow'
                  },
                    h('div', { className: 'p-6' },
                      h('h3', { className: 'font-semibold text-lg leading-none tracking-tight' }, pkg.name),
                      h('p', { className: 'text-sm mt-1.5 ' + (pkg.featured ? 'text-primary font-semibold' : 'text-muted-foreground') }, pkg.tagline)
                    ),
                    h('div', { className: 'p-6 pt-0 space-y-4' },
                      h('div', null,
                        h('div', { className: 'text-3xl font-bold' }, pkg.price),
                        pkg.savings && h('div', { className: 'text-sm text-muted-foreground' }, pkg.savings)
                      ),
                      h('ul', { className: 'space-y-2 text-base text-muted-foreground' },
                        (pkg.features || []).map(function(f, j) {
                          return h('li', { key: j, className: 'flex items-start gap-2' },
                            h('span', { className: 'text-primary' }, '✓'),
                            h('span', null, f)
                          );
                        })
                      )
                    )
                  );
                })
              ),
              pricing.note && h('p', { className: 'text-center text-muted-foreground mt-6' }, pricing.note)
            )
          )
        )
      );
    };
    CMS.registerPreviewTemplate('standard-licence', StandardPreview);

    // About page preview
    var AboutPreview = function(props) {
      var data = props.entry.getIn(['data']).toJS();
      var hero = data.hero || {};
      var story = data.story || [];
      var instructors = data.instructors || [];

      return h('div', null,
        PageHeroPreview(hero.title, hero.description),

        h('div', { className: 'py-16' },
          h('div', { className: 'container px-4' },
            h('div', { className: 'max-w-4xl mx-auto space-y-12 mb-16' },
              h('div', { className: 'prose prose-lg max-w-none' },
                h('h2', { className: 'text-2xl font-bold mb-4' }, 'Our Story'),
                story.map(function(para, i) {
                  return h('p', { key: i, className: 'text-muted-foreground leading-relaxed mt-4' }, para);
                })
              )
            ),
            h('div', { className: 'grid md:grid-cols-2 gap-8 max-w-5xl mx-auto' },
              instructors.map(function(inst, i) {
                return h('div', { key: i, className: 'rounded-xl border bg-card text-card-foreground shadow' },
                  h('div', { className: 'p-6' },
                    h('h3', { className: 'text-xl font-semibold' }, inst.name),
                    h('p', { className: 'text-sm text-primary mt-1' },
                      (inst.job_title || '') + (inst.experience ? ' · ' + inst.experience + ' years' : '')),
                    h('p', { className: 'text-muted-foreground text-sm mt-3' }, inst.bio)
                  )
                );
              })
            )
          )
        )
      );
    };
    CMS.registerPreviewTemplate('about', AboutPreview);

    // Site settings preview
    var SiteSettingsPreview = function(props) {
      var data = props.entry.getIn(['data']).toJS();

      return h('div', { className: 'container px-4 py-16' },
        h('h2', { className: 'text-3xl font-bold mb-8' }, 'Global Site Settings'),
        h('div', { className: 'rounded-xl border bg-card text-card-foreground shadow mb-8' },
          h('div', { className: 'p-6' },
            h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
              h('tbody', null,
                [
                  ['Phone', data.phone],
                  ['Phone Link', data.phone_href],
                  ['Email', data.email],
                  ['Location', data.location]
                ].map(function(row, i) {
                  return h('tr', { key: i, style: { borderBottom: '1px solid var(--border)' } },
                    h('td', { className: 'p-2 font-semibold', style: { width: '40%' } }, row[0]),
                    h('td', { className: 'p-2 text-muted-foreground' }, row[1] || '—')
                  );
                })
              )
            )
          )
        ),
        h('h3', { className: 'text-lg font-semibold mb-3' }, 'Standard Service Areas'),
        h('div', { className: 'flex flex-wrap gap-2 mb-6' },
          (data.service_areas_standard || []).map(function(area, i) {
            return h('span', { key: i, className: 'px-3 py-1 bg-muted rounded-full text-sm' }, area);
          })
        ),
        h('h3', { className: 'text-lg font-semibold mb-3' }, 'C1 Service Areas'),
        h('div', { className: 'flex flex-wrap gap-2' },
          (data.service_areas_c1 || []).map(function(area, i) {
            return h('span', { key: i, className: 'px-3 py-1 bg-primary/10 text-primary rounded-full text-sm' }, area);
          })
        )
      );
    };
    CMS.registerPreviewTemplate('site', SiteSettingsPreview);

    // Collection-level dispatchers for Decap CMS 3.x (looks up by collection name for files collections)
    var PagesPreview = function(props) {
      var path = (props.entry.get('path') || props.entry.get('slug') || '');
      if (path.indexOf('homepage') !== -1) return HomepagePreview(props);
      if (path.indexOf('c1-licence') !== -1) return C1Preview(props);
      if (path.indexOf('standard-licence') !== -1) return StandardPreview(props);
      if (path.indexOf('about') !== -1) return AboutPreview(props);
      return null;
    };
    CMS.registerPreviewTemplate('pages', PagesPreview);

    var SettingsPreview = function(props) {
      return SiteSettingsPreview(props);
    };
    CMS.registerPreviewTemplate('settings', SettingsPreview);
  </script>
</body>
</html>
